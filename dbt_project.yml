name: 'airbnb_analytics'
version: '1.0.0'
config-version: 2

profile: 'airbnb_analytics'

model-paths: ["models"]
test-paths: ["tests"]
data-paths: ["data"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  airbnb_analytics:
    bronze:
      materialized: table
      schema: bronze
    silver:
      materialized: table
      schema: silver
    gold:
      materialized: table
      schema: gold

vars:
  data_path: "./data"
